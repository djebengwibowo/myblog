<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Loan Portfolio Simulator</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #1e40af;
            --bg: #f3f4f6;
            --card: #ffffff;
            --text: #1f2937;
            --border: #e5e7eb;
            --success: #059669;
            --danger: #dc2626;
            --guide-bg: #fefce8;
            --guide-border: #fef08a;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); padding: 15px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        .lang-bar { display: flex; justify-content: flex-end; margin-bottom: 10px; gap: 8px; }
        .lang-select { padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); background: white; cursor: pointer; font-weight: 600; font-size: 0.8rem; }

        header { text-align: center; margin-bottom: 20px; }
        header h1 { color: var(--secondary); margin-bottom: 5px; font-size: 1.5rem; }

        /* Guide Box */
        .guide-box { background: var(--guide-bg); border: 1px solid var(--guide-border); padding: 12px; border-radius: 10px; margin-bottom: 20px; }
        .guide-box h3 { margin: 0 0 10px 0; color: #854d0e; font-size: 0.85rem; }
        .guide-steps { display: flex; flex-wrap: nowrap; gap: 8px; width: 100%; }
        .step { flex: 1; background: rgba(255,255,255,0.6); padding: 8px; border-radius: 6px; border: 1px solid #fef08a; font-size: 11px; min-width: 0; }
        .step b { color: var(--secondary); display: block; margin-bottom: 2px; }

        .card { background: var(--card); border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 20px; margin-bottom: 20px; }
        
        .mode-selector { display: flex; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        .mode-btn { flex: 1; padding: 8px; border: 1px solid var(--border); background: #f9fafb; cursor: pointer; border-radius: 6px; font-weight: 600; font-size: 0.85rem; min-width: 120px; }
        .mode-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .form-group { display: flex; flex-direction: column; transition: opacity 0.3s; }
        .form-group label { font-size: 0.75rem; font-weight: 600; margin-bottom: 4px; color: #4b5563; }
        .form-group input, .form-group select { padding: 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.9rem; }
        .form-group input:disabled { background-color: #e5e7eb; cursor: not-allowed; }

        /* Highlighted Error Box */
        .error-msg { background-color: #fee2e2; color: #b91c1c; border: 1px solid #f87171; padding: 12px; border-radius: 6px; font-weight: 600; font-size: 0.85rem; margin-top: 15px; display: none; }

        .action-btn { background-color: var(--primary); color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; transition: 0.2s; }
        .action-btn:hover { background-color: var(--secondary); }
        
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-top: 15px; }
        .summary-item { background: #eff6ff; padding: 12px; border-radius: 8px; text-align: center; }
        .summary-item h3 { margin: 0; font-size: 0.65rem; color: #6b7280; }
        .summary-item p { margin: 4px 0 0; font-size: 1rem; font-weight: bold; color: var(--secondary); }

        .table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { padding: 10px; text-align: right; border-bottom: 1px solid var(--border); }
        th { background: #f8fafc; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-bar">
        <select class="lang-select" id="lang-switch" onchange="changeLanguage()">
            <option value="en">🇺🇸 English</option>
            <option value="id">🇮🇩 Bahasa Indonesia</option>
        </select>
    </div>

    <header><h1 id="t-main-title">Loan Portfolio Simulator</h1></header>

    <div class="guide-box">
        <h3 id="t-guide-title">💡 Quick Start Guide</h3>
        <div class="guide-steps">
            <div id="t-step-1" class="step"><b>1. Select Goal</b>Pick what to calculate.</div>
            <div id="t-step-2" class="step"><b>2. Method</b>Effective or Flat Rate.</div>
            <div id="t-step-3" class="step"><b>3. Analyze</b>Check summary & table.</div>
        </div>
    </div>

    <div class="card">
        <div class="mode-selector">
            <button class="mode-btn active" id="btn-payment" onclick="setMode('payment')">Find Payment</button>
            <button class="mode-btn" id="btn-loan" onclick="setMode('loan')">Find Loan Amount</button>
            <button class="mode-btn" id="btn-rate" onclick="setMode('rate')">Find Rate</button>
            <button class="mode-btn" id="btn-tenor" onclick="setMode('tenor')">Find Tenor</button>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label id="t-method-label">Interest Method</label>
                <select id="interest-type">
                    <option value="effective" id="opt-effective">Effective (Declining)</option>
                    <option value="flat" id="opt-flat">Flat (Fixed)</option>
                </select>
            </div>
            <div class="form-group" id="grp-loan"><label id="l-loan">Loan Amount</label><input type="number" id="input-loan"></div>
            <div class="form-group" id="grp-payment"><label id="l-payment">Monthly Payment</label><input type="number" id="input-payment"></div>
            <div class="form-group" id="grp-rate"><label id="l-rate">Yearly Rate (%)</label><input type="number" id="input-rate" step="0.01"></div>
            <div class="form-group" id="grp-tenor"><label id="l-tenor">Tenor (Years)</label><input type="number" id="input-tenor"></div>
        </div>
        
        <div id="error-box" class="error-msg"></div>
        <button class="action-btn" id="t-run-btn" onclick="calculate()">Run Simulation</button>
    </div>

    <div id="result-section" class="card" style="display:none;">
        <div class="summary-grid">
            <div class="summary-item"><h3 id="s-loan">Total Principal</h3><p id="res-loan">-</p></div>
            <div class="summary-item"><h3 id="s-payment">Monthly Payment</h3><p id="res-payment">-</p></div>
            <div class="summary-item"><h3 id="s-interest">Total Interest</h3><p id="res-total-interest">-</p></div>
        </div>
        <div class="table-container">
            <table>
                <thead id="table-head"><tr><th>Mo</th><th>Opening</th><th>Payment</th><th>Principal</th><th>Interest</th><th>Closing</th></tr></thead>
                <tbody id="schedule-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const translations = {
        en: { 
            title: "Loan Portfolio Simulator", guide: "💡 Quick Start Guide",
            s1: "<b>1. Select Goal</b>Pick what to calculate.", s2: "<b>2. Method</b>Effective or Flat Rate.",
            s3: "<b>3. Analyze</b>Check summary & table.", findP: "Find Payment", findL: "Find Loan Amount",
            findR: "Find Rate", findT: "Find Tenor", method: "Interest Method", optEff: "Effective (Declining)",
            optFlat: "Flat (Fixed)", loan: "Loan Amount", payment: "Monthly Payment", rate: "Yearly Rate (%)",
            tenor: "Tenor (Years)", run: "Run Simulation", totalP: "Total Principal", totalI: "Total Interest"
        },
        id: { 
            title: "Simulator Portofolio Pinjaman", guide: "💡 Panduan Cepat",
            s1: "<b>1. Pilih Tujuan</b>Pilih nilai yang dicari.", s2: "<b>2. Metode</b>Efektif atau Flat.",
            s3: "<b>3. Analisis</b>Cek ringkasan.", findP: "Cari Cicilan", findL: "Cari Pinjaman",
            findR: "Cari Bunga", findT: "Cari Tenor", method: "Metode Bunga", optEff: "Efektif (Menurun)",
            optFlat: "Flat (Tetap)", loan: "Jumlah Pinjaman", payment: "Cicilan", rate: "Bunga (%)",
            tenor: "Tenor (Tahun)", run: "Jalankan Simulasi", totalP: "Total Pokok", totalI: "Total Bunga"
        }
    };

    let currentMode = 'payment';
    const fmt = (n) => new Intl.NumberFormat('en-US').format(Math.round(n));

    // Initialize UI on page load
    window.onload = function() {
        setMode('payment');
        document.getElementById('input-loan').value = "100000000";
        document.getElementById('input-rate').value = "12";
        document.getElementById('input-tenor').value = "5";
    };

    function setMode(mode) {
        currentMode = mode;
        
        // Update Buttons
        document.querySelectorAll('.mode-btn').forEach(b => {
            if (b.id.includes(mode)) b.classList.add('active');
            else b.classList.remove('active');
        });
        
        // Update Inputs
        ['loan', 'payment', 'rate', 'tenor'].forEach(id => {
            const input = document.getElementById(`input-${id}`);
            input.disabled = (id === mode);
            if (id === mode) input.value = ''; // Clear the field we are trying to solve
            document.getElementById(`grp-${id}`).style.opacity = (id === mode ? '0.5' : '1');
        });
        
        // Hide previous results
        document.getElementById('result-section').style.display = 'none';
        document.getElementById('error-box').style.display = 'none';
    }

    function changeLanguage() {
        const l = document.getElementById('lang-switch').value;
        const d = translations[l];
        document.getElementById('t-main-title').innerText = d.title;
        document.getElementById('t-guide-title').innerText = d.guide;
        document.getElementById('t-step-1').innerHTML = d.s1;
        document.getElementById('t-step-2').innerHTML = d.s2;
        document.getElementById('t-step-3').innerHTML = d.s3;
        document.getElementById('btn-payment').innerText = d.findP;
        document.getElementById('btn-loan').innerText = d.findL;
        document.getElementById('btn-rate').innerText = d.findR;
        document.getElementById('btn-tenor').innerText = d.findT;
        document.getElementById('t-method-label').innerText = d.method;
        document.getElementById('opt-effective').innerText = d.optEff;
        document.getElementById('opt-flat').innerText = d.optFlat;
        document.getElementById('l-loan').innerText = d.loan;
        document.getElementById('l-payment').innerText = d.payment;
        document.getElementById('l-rate').innerText = d.rate;
        document.getElementById('l-tenor').innerText = d.tenor;
        document.getElementById('t-run-btn').innerText = d.run;
        document.getElementById('s-loan').innerText = d.totalP;
        document.getElementById('s-interest').innerText = d.totalI;
    }

    function solveRate(n, pmt, pv) {
        let r = 0.01; // Initial guess
        for(let i=0; i<50; i++) {
            let f = pmt * (1 - Math.pow(1+r, -n)) / r - pv;
            let df = pmt * (n*r*Math.pow(1+r, -n-1) - (1-Math.pow(1+r, -n))) / (r*r);
            r = r - f/df;
        } 
        return r;
    }

    function calculate() {
        document.getElementById('error-box').style.display = 'none';
        
        try {
            const type = document.getElementById('interest-type').value;
            
            let valP = document.getElementById('input-loan').value;
            let valM = document.getElementById('input-payment').value;
            let valR = document.getElementById('input-rate').value;
            let valT = document.getElementById('input-tenor').value;
            
            let P = parseFloat(valP) || 0;
            let M = parseFloat(valM) || 0;
            let R = parseFloat(valR) || 0;
            let T = parseFloat(valT) || 0;

            // Pre-calculation Validation
            if (currentMode !== 'loan' && valP === '') throw "Please enter the Loan Amount.";
            if (currentMode !== 'payment' && valM === '') throw "Please enter the Monthly Payment.";
            if (currentMode !== 'rate' && valR === '') throw "Please enter the Interest Rate.";
            if (currentMode !== 'tenor' && valT === '') throw "Please enter the Tenor.";

            let n = T * 12;
            let r = R / 100 / 12;

            // Math Engine
            if (type === 'flat') {
                if (currentMode === 'payment') M = (P / n) + (P * r);
                else if (currentMode === 'loan') P = M / ((1/n) + r);
                else if (currentMode === 'tenor') n = P / (M - (P * r));
                else if (currentMode === 'rate') { r = ((M * n - P) / P / n); R = r * 12 * 100; }
            } else {
                if (currentMode === 'payment') {
                    M = (r === 0) ? (P / n) : P * (r * Math.pow(1+r, n)) / (Math.pow(1+r, n) - 1);
                } else if (currentMode === 'loan') {
                    P = (r === 0) ? (M * n) : M * (Math.pow(1+r, n) - 1) / (r * Math.pow(1+r, n));
                } else if (currentMode === 'tenor') {
                    if (M <= P * r) throw "Payment is too small to cover the monthly interest. The loan will never be paid off.";
                    n = -Math.log(1 - (r*P)/M) / Math.log(1+r);
                } else if (currentMode === 'rate') {
                    if (M * n <= P) throw "Total payments must be greater than the original loan amount.";
                    r = solveRate(n, M, P);
                    R = r * 12 * 100;
                }
            }

            // Sync adjusted variables back to standard format
            if (currentMode === 'tenor') T = n / 12;
            
            // Post-calculation Validation
            if (!isFinite(M) || !isFinite(P) || !isFinite(n) || M <= 0 || P <= 0 || n <= 0) {
                throw "Mathematical error: Impossible to calculate with these parameters. Please adjust your inputs.";
            }

            // Repopulate the calculated value into the UI
            if (currentMode === 'payment') document.getElementById('input-payment').value = M.toFixed(2);
            if (currentMode === 'loan') document.getElementById('input-loan').value = P.toFixed(2);
            if (currentMode === 'tenor') document.getElementById('input-tenor').value = T.toFixed(2);
            if (currentMode === 'rate') document.getElementById('input-rate').value = R.toFixed(2);

            // Pass the monthly decimal rate to the table renderer
            renderTable(P, M, r, n, type);

        } catch (e) {
            let errBox = document.getElementById('error-box');
            errBox.innerText = "Error: " + e;
            errBox.style.display = 'block';
            document.getElementById('result-section').style.display = 'none';
        }
    }

    function renderTable(P, M, r, n, type) {
        document.getElementById('res-loan').innerText = fmt(P);
        document.getElementById('res-payment').innerText = fmt(M);
        
        let tbody = document.getElementById('schedule-body');
        tbody.innerHTML = '';
        
        let balance = P;
        let totalInt = 0;
        
        for (let i = 1; i <= Math.ceil(n); i++) {
            // Flat charges interest on original principal; Effective charges on remaining balance
            let interest = (type === 'flat') ? (P * r) : (balance * r);
            let principal = M - interest;
            
            // Final month adjustment
            if (balance < principal || i === Math.ceil(n)) { 
                principal = balance; 
                interest = M - principal; 
                balance = 0; 
            } else { 
                balance -= principal; 
            }
            
            totalInt += interest;
            
            tbody.innerHTML += `<tr>
                <td>${i}</td>
                <td>${fmt(balance + principal)}</td>
                <td>${fmt(principal + interest)}</td>
                <td style="color:var(--success)">${fmt(principal)}</td>
                <td style="color:var(--danger)">${fmt(interest)}</td>
                <td>${fmt(balance)}</td>
            </tr>`;
            
            if (balance <= 0) break;
        }
        
        document.getElementById('res-total-interest').innerText = fmt(totalInt);
        document.getElementById('result-section').style.display = 'block';
    }
</script>
</body>
</html>
