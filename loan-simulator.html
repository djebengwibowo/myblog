<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Loan Portfolio Simulator</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #1e40af;
            --bg: #f3f4f6;
            --card: #ffffff;
            --text: #1f2937;
            --border: #e5e7eb;
            --success: #059669;
            --danger: #dc2626;
            --guide-bg: #fefce8;
            --guide-border: #fef08a;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); padding: 15px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        .lang-bar { display: flex; justify-content: flex-end; margin-bottom: 10px; gap: 8px; }
        .lang-select { padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); background: white; cursor: pointer; font-weight: 600; font-size: 0.8rem; }

        header { text-align: center; margin-bottom: 20px; }
        header h1 { color: var(--secondary); margin-bottom: 5px; font-size: 1.5rem; }

        /* INTERNAL GUIDE - FORCED 1 ROW */
        .guide-box { background: var(--guide-bg); border: 1px solid var(--guide-border); padding: 12px; border-radius: 10px; margin-bottom: 20px; }
        .guide-box h3 { margin: 0 0 10px 0; color: #854d0e; font-size: 0.85rem; }
        .guide-steps { display: flex; flex-wrap: nowrap; gap: 8px; width: 100%; }
        .step { flex: 1; background: rgba(255,255,255,0.6); padding: 8px; border-radius: 6px; border: 1px solid #fef08a; font-size: 11px; min-width: 0; }
        .step b { color: var(--secondary); display: block; margin-bottom: 2px; }

        .card { background: var(--card); border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 20px; margin-bottom: 20px; }
        
        .mode-selector { display: flex; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        .mode-btn { flex: 1; padding: 8px; border: 1px solid var(--border); background: #f9fafb; cursor: pointer; border-radius: 6px; font-weight: 600; font-size: 0.85rem; min-width: 120px; }
        .mode-btn.active { background: var(--primary); color: white; }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 0.75rem; font-weight: 600; margin-bottom: 4px; }
        .form-group input, .form-group select { padding: 8px; border: 1px solid var(--border); border-radius: 6px; }

        .action-btn { background-color: var(--primary); color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; }

        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-top: 15px; }
        .summary-item { background: #eff6ff; padding: 12px; border-radius: 8px; text-align: center; }
        .summary-item h3 { margin: 0; font-size: 0.65rem; color: #6b7280; }
        .summary-item p { margin: 4px 0 0; font-size: 1rem; font-weight: bold; color: var(--secondary); }

        .table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { padding: 10px; text-align: right; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-bar">
        <select class="lang-select" id="lang-switch" onchange="changeLanguage()">
            <option value="en">🇺🇸 English</option>
            <option value="id">🇮🇩 Bahasa Indonesia</option>
        </select>
    </div>

    <header><h1 id="t-main-title">Loan Portfolio Simulator</h1></header>

    <div class="guide-box">
        <h3 id="t-guide-title">💡 Quick Start Guide</h3>
        <div class="guide-steps">
            <div id="t-step-1" class="step"><b>1. Select Goal</b>Pick what to calculate.</div>
            <div id="t-step-2" class="step"><b>2. Method</b>Effective or Flat Rate.</div>
            <div id="t-step-3" class="step"><b>3. Analyze</b>Check summary & table.</div>
        </div>
    </div>

    <div class="card">
        <h3 id="t-calc-settings" style="font-size: 1rem; margin-top:0;">Calculation Settings</h3>
        <div class="mode-selector">
            <button class="mode-btn active" id="btn-payment" onclick="setMode('payment')">Find Payment</button>
            <button class="mode-btn" id="btn-loan" onclick="setMode('loan')">Find Loan Amount</button>
            <button class="mode-btn" id="btn-rate" onclick="setMode('rate')">Find Rate</button>
            <button class="mode-btn" id="btn-tenor" onclick="setMode('tenor')">Find Tenor</button>
        </div>

        <div class="form-grid">
            <div class="form-group"><label id="t-method-label">Interest Method</label>
                <select id="interest-type">
                    <option value="effective">Effective</option>
                    <option value="flat">Flat</option>
                </select>
            </div>
            <div class="form-group" id="grp-loan"><label id="l-loan">Loan Amount</label><input type="number" id="input-loan"></div>
            <div class="form-group" id="grp-payment"><label id="l-payment">Monthly Payment</label><input type="number" id="input-payment"></div>
            <div class="form-group" id="grp-rate"><label id="l-rate">Yearly Rate (%)</label><input type="number" id="input-rate" step="0.01"></div>
            <div class="form-group" id="grp-tenor"><label id="l-tenor">Tenor (Years)</label><input type="number" id="input-tenor"></div>
        </div>
        <button class="action-btn" id="t-run-btn" onclick="calculate()">Run Simulation</button>
    </div>

    <div id="result-section" class="card" style="display:none;">
        <div class="summary-grid">
            <div class="summary-item"><h3 id="s-loan">Total Principal</h3><p id="res-loan">-</p></div>
            <div class="summary-item"><h3 id="s-interest">Total Interest</h3><p id="res-total-interest">-</p></div>
        </div>
        <div class="table-container">
            <table>
                <thead id="table-head"><tr><th>Mo</th><th>Opening</th><th>Payment</th><th>Principal</th><th>Interest</th><th>Closing</th></tr></thead>
                <tbody id="schedule-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    /* ... logic for calculator ... */
    function setMode(mode) {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.id.includes(mode)));
        ['loan', 'payment', 'rate', 'tenor'].forEach(id => {
            document.getElementById(`input-${id}`).disabled = (id === mode);
        });
    }
    // (Calculation functions omitted for brevity but remain the same as previous)
</script>
</body>
</html>
